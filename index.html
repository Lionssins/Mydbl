<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Ruang Meeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Warna Khusus Ruangan */
        .bg-cycling { background-color: #3b82f6; color: white; border: 1px solid #2563eb; }
        .bg-football { background-color: #8b5cf6; color: white; border: 1px solid #7c3aed; }
        .bg-running { background-color: #f59e0b; color: white; border: 1px solid #d97706; }
        .bg-athletic { background-color: #10b981; color: white; border: 1px solid #059669; }
        .bg-basketball { background-color: #ec4899; color: white; border: 1px solid #db2777; }

        .day-badges-container::-webkit-scrollbar { display: none; }
        .day-badges-container { scrollbar-width: none; }
        
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="w-full max-w-screen-2xl mx-auto px-2 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img class="h-10 md:h-12 w-auto object-contain bg-white p-1 rounded shadow-sm" src="./logo.png" alt="Logo" onerror="this.style.display='none'">
                <h1 class="text-xl font-bold tracking-wide">Peminjaman Ruangan</h1>
            </div>
            <button onclick="showAdminLogin()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition shadow flex items-center gap-2">
                <i class="fas fa-user-shield"></i> <span class="hidden md:inline">Admin Login</span>
            </button>
        </div>
    </nav>

    <div class="w-full max-w-screen-2xl mx-auto p-4 mt-2">
        <div class="bg-white p-4 md:p-6 rounded-xl shadow-md w-full">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-700 flex items-center gap-2">
                    <i class="far fa-calendar-alt text-blue-600"></i> Jadwal Ketersediaan
                </h2>
                <div class="flex gap-2">
                    <select id="yearSelect" class="border border-gray-300 rounded-lg p-2 bg-gray-50 outline-none font-semibold text-gray-700" onchange="renderCalendar()"></select>
                    <select id="monthSelect" class="border border-gray-300 rounded-lg p-2 bg-gray-50 outline-none font-semibold text-gray-700" onchange="renderCalendar()">
                        <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                        <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                        <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                        <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1 text-center mb-2 font-bold text-gray-500 text-sm md:text-base">
                <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
            </div>
            
            <div id="calendar" class="grid grid-cols-7 gap-1 text-sm bg-gray-100 border border-gray-200 rounded-lg p-1">
                </div>
            
            <div class="mt-6 flex flex-wrap gap-4 text-xs md:text-sm justify-center font-semibold bg-gray-50 p-3 rounded-lg border border-gray-200">
                <span class="flex items-center gap-2"><div class="w-4 h-4 bg-cycling rounded-full shadow-sm"></div> Cycling</span>
                <span class="flex items-center gap-2"><div class="w-4 h-4 bg-football rounded-full shadow-sm"></div> FootBall</span>
                <span class="flex items-center gap-2"><div class="w-4 h-4 bg-running rounded-full shadow-sm"></div> Running</span>
                <span class="flex items-center gap-2"><div class="w-4 h-4 bg-athletic rounded-full shadow-sm"></div> Athletic</span>
                <span class="flex items-center gap-2"><div class="w-4 h-4 bg-basketball rounded-full shadow-sm"></div> Basketball</span>
            </div>
        </div>
    </div>

    <div id="viewDayModal" style="display: none; z-index: 9999;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl flex flex-col max-h-[95vh] overflow-hidden">
            <div class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
                <h3 class="font-bold text-lg md:text-xl flex items-center gap-2" id="viewDayTitle">
                    <i class="far fa-calendar-check"></i> Detail & Booking
                </h3>
                <button onclick="closeModal('viewDayModal')" class="text-white hover:text-red-300 font-bold text-3xl leading-none transition">&times;</button>
            </div>
            
            <div class="flex flex-col md:flex-row flex-1 overflow-y-auto bg-gray-50">
                
                <div class="flex-1 p-5 md:border-r border-gray-200">
                    <h4 class="font-bold text-gray-700 border-b-2 border-gray-200 pb-2 mb-4 flex items-center gap-2">
                        <i class="fas fa-list-ul text-blue-500"></i> Jadwal Ruangan Terpakai
                    </h4>
                    <div id="viewDayContent" class="space-y-3">
                        </div>
                </div>

                <div class="flex-1 p-5 bg-white">
                    <h4 class="font-bold text-blue-700 border-b-2 border-blue-100 pb-2 mb-4 flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i> Form Peminjaman Baru
                    </h4>
                    <form id="PeminjamanForm" onsubmit="savePeminjaman(event)" class="space-y-4">
                        <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 flex items-center gap-3">
                            <i class="far fa-calendar-alt text-blue-600 text-xl"></i>
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-blue-800 uppercase tracking-wider mb-0.5">Tanggal Peminjaman</label>
                                <input type="date" id="bDate" required readonly class="w-full bg-transparent font-bold text-gray-700 outline-none cursor-not-allowed">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Divisi</label>
                                <select id="bDivisi" required onchange="filterNamesByDivision()" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white transition">
                                    <option value="" disabled selected>-- Memuat Data... --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pemesan</label>
                                <select id="bName" required class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white transition">
                                    <option value="" disabled selected>-- Pilih Divisi Dulu --</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">No. WhatsApp</label>
                            <input type="tel" id="bPhone" required placeholder="Contoh: 08123456789" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Ruangan</label>
                            <select id="bRoom" required class="w-full border border-gray-300 rounded-lg p-2.5 bg-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                                <option value="Cycling Room">Cycling Room (Kapasitas 8)</option>
                                <option value="FootBall Room">FootBall Room (Kapasitas 9)</option>
                                <option value="Running Room">Running Room (Kapasitas 3)</option>
                                <option value="Athletic Room">Athletic Room (Kapasitas 6)</option>
                                <option value="Basketball Room">Basketball Room (Kapasitas 12)</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Jam Mulai</label>
                                <input type="time" id="bStart" required class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Jam Selesai</label>
                                <input type="time" id="bEnd" required class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-lg shadow-md transition transform flex justify-center items-center gap-2">
                            <i class="fas fa-check-circle"></i> Konfirmasi & Simpan
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" style="display: none; z-index: 9999;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="bg-blue-800 text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-lock"></i> Admin Login</h3>
                <button onclick="closeModal('adminModal')" class="text-white hover:text-red-300 font-bold text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="admUser" class="w-full border rounded-lg p-2.5 outline-none focus:border-blue-500 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="admPass" class="w-full border rounded-lg p-2.5 outline-none focus:border-blue-500 bg-gray-50">
                </div>
                <button onclick="processAdminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow mt-2">Login</button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" style="display: none; z-index: 9999;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl flex flex-col max-h-[90vh]">
            <div class="bg-red-700 text-white p-4 flex justify-between items-center shadow-md rounded-t-xl">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-cogs"></i> Dashboard Admin GA</h3>
                <button onclick="closeModal('adminDashboard')" class="text-white hover:text-red-300 font-bold text-2xl leading-none">&times;</button>
            </div>
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <span class="text-sm text-gray-600 font-medium">Manajemen Jadwal Ketersediaan</span>
                <button onclick="downloadSpreadsheet()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow flex items-center gap-2">
                    <i class="fas fa-file-csv"></i> Download CSV
                </button>
            </div>
            <div class="p-0 overflow-y-auto flex-1 bg-white">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-gray-100 text-gray-700 sticky top-0 shadow-sm z-10">
                        <tr>
                            <th class="p-3 border-b">Tanggal</th>
                            <th class="p-3 border-b">Jam</th>
                            <th class="p-3 border-b">Ruangan</th>
                            <th class="p-3 border-b">Pemesan</th>
                            <th class="p-3 border-b">No WhatsApp</th>
                            <th class="p-3 border-b text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // =====================================================================
        // PASTE LINK WEB APP DARI GOOGLE APPS SCRIPT ANDA DI BAWAH INI:
        // =====================================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRQf7bEQSqw_pKjEafcPETCNo46gA3yzm6N2QTEbfOOq-FxJMPiq12lAoZDFH2YVG7gQ/exec'; 
        
        const ADMIN_WA = '62881081371012'; 

        let Peminjamans = [];
        let employeesData = []; 

        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const today = new Date();
        let currentMonth = today.getMonth();
        let currentYear = today.getFullYear();

        document.addEventListener('DOMContentLoaded', () => {
            initControls();
            document.getElementById('calendar').innerHTML = "<div class='col-span-7 text-center py-20 text-blue-600 font-bold text-lg'><i class='fas fa-spinner fa-spin text-3xl mb-3'></i><br>Menghubungkan ke Database...</div>";
            loadPeminjamans();
        });

        function initControls() {
            const mSelect = document.getElementById('monthSelect');
            const ySelect = document.getElementById('yearSelect');

            mSelect.value = currentMonth;
            ySelect.innerHTML = "";
            for(let y = currentYear - 1; y <= currentYear + 2; y++) {
                let opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                if(y === currentYear) opt.selected = true;
                ySelect.appendChild(opt);
            }
        }

        function formatPhoneForWA(phone) {
            if (!phone) return "";
            let formattedPhone = phone.replace(/\D/g, ''); 
            if (formattedPhone.startsWith('0')) {
                formattedPhone = '62' + formattedPhone.substring(1);
            }
            return formattedPhone;
        }

        function generateWaLinkHTML(phone) {
            if (!phone) return `<span class="text-gray-400 text-xs italic">- Nomor tidak tersedia -</span>`;
            const waNumber = formatPhoneForWA(phone);
            return `<a href="https://wa.me/${waNumber}" target="_blank" class="text-green-600 hover:text-green-800 hover:underline inline-flex items-center gap-1.5 transition font-medium text-xs bg-green-50 px-2 py-1 rounded border border-green-200">
                <i class="fab fa-whatsapp text-green-500 text-sm"></i> ${phone}
            </a>`;
        }

        async function loadPeminjamans() {
            if (SCRIPT_URL === 'PASTE_LINK_ANDA_DI_SINI' || SCRIPT_URL === '') {
                document.getElementById('calendar').innerHTML = `<div class='col-span-7 text-center py-6 text-red-600 font-bold bg-red-50 border border-red-200 rounded p-4'>❌ ANDA LUPA MEMASUKKAN SCRIPT_URL DI KODE HTML.</div>`;
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json(); 
                
                let rawPeminjamans = [];

                if (Array.isArray(data)) {
                    rawPeminjamans = data;
                } else {
                    rawPeminjamans = data.bookings || [];
                    employeesData = [];
                    const rawNames = data.names || [];
                    const rawDivisions = data.divisions || [];
                    
                    for(let i = 0; i < Math.max(rawNames.length, rawDivisions.length); i++) {
                        if(rawNames[i] && rawDivisions[i]) {
                            employeesData.push({ name: rawNames[i], division: rawDivisions[i] });
                        }
                    }
                    
                    const uniqueDivisions = [...new Set(employeesData.map(e => e.division))];
                    renderOptions('bDivisi', uniqueDivisions);
                }

                Peminjamans = rawPeminjamans.map(b => {
                    let formattedDate = b.date;
                    let formattedStart = b.start;
                    let formattedEnd = b.end;

                    if (typeof formattedDate === 'string' && formattedDate.includes('T')) {
                        let d = new Date(formattedDate);
                        formattedDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    }
                    if (typeof formattedStart === 'string' && formattedStart.includes('T')) {
                        let d = new Date(formattedStart);
                        formattedStart = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
                    } else if (typeof formattedStart === 'string' && formattedStart.length <= 5) {
                        if(formattedStart.length === 4) formattedStart = '0' + formattedStart;
                    }
                    if (typeof formattedEnd === 'string' && formattedEnd.includes('T')) {
                        let d = new Date(formattedEnd);
                        formattedEnd = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
                    } else if (typeof formattedEnd === 'string' && formattedEnd.length <= 5) {
                        if(formattedEnd.length === 4) formattedEnd = '0' + formattedEnd;
                    }
                    return { ...b, date: formattedDate, start: formattedStart, end: formattedEnd, phone: b.phone || '' };
                });
                
                renderCalendar();
            } catch (error) {
                document.getElementById('calendar').innerHTML = `
                <div class='col-span-7 text-center py-10 text-red-600 bg-red-50 border border-red-200 rounded p-6'>
                    <p class='font-bold text-xl mb-2'>❌ Gagal membaca database</p>
                    <p class='text-base mb-4 text-gray-700'>Error: <i>${error.message}</i></p>
                    <p class='text-sm font-semibold text-gray-500'>Solusi: Pastikan SCRIPT_URL di HTML sudah benar, dan Apps Script sudah di Deploy dengan akses "Anyone".</p>
                </div>`;
                console.error("Error Load DB:", error);
            }
        }

        function renderOptions(elementId, items) {
            const select = document.getElementById(elementId);
            if(items.length === 0) {
                select.innerHTML = `<option value="" disabled selected>-- Data Kosong --</option>`;
                return;
            }
            select.innerHTML = `<option value="" disabled selected>-- Pilih --</option>`;
            items.forEach(item => {
                if(item) select.innerHTML += `<option value="${item}">${item}</option>`;
            });
        }

        function filterNamesByDivision() {
            const selectedDivision = document.getElementById('bDivisi').value;
            const nameDropdown = document.getElementById('bName');
            
            nameDropdown.innerHTML = `<option value="" disabled selected>-- Pilih Nama --</option>`;
            
            if(selectedDivision) {
                const filteredNames = employeesData.filter(e => e.division === selectedDivision).map(e => e.name);
                filteredNames.forEach(name => {
                    nameDropdown.innerHTML += `<option value="${name}">${name}</option>`;
                });
            }
        }

        function getRoomClass(roomName) {
            if (roomName.includes('Cycling')) return 'bg-cycling';
            if (roomName.includes('FootBall')) return 'bg-football';
            if (roomName.includes('Running')) return 'bg-running';
            if (roomName.includes('Athletic')) return 'bg-athletic';
            if (roomName.includes('Basketball')) return 'bg-basketball';
            return 'bg-gray-500 text-white'; 
        }

        function renderCalendar() {
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            currentYear = parseInt(document.getElementById('yearSelect').value);

            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Membuat kotak tinggi dinamis untuk kalender yang lebih lapang
            const boxClass = "min-h-[100px] md:min-h-[130px] lg:min-h-[160px]";

            for(let i = 0; i < firstDay; i++) {
                calendar.innerHTML += `<div class="${boxClass} bg-transparent"></div>`;
            }

            for(let i = 1; i <= daysInMonth; i++) {
                let dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let daysPeminjamans = Peminjamans.filter(b => b.date === dateStr);
                daysPeminjamans.sort((a,b) => a.start.localeCompare(b.start));

                let bgClass = daysPeminjamans.length > 0 ? "bg-blue-50 hover:bg-blue-100 cursor-pointer" : "bg-white hover:bg-gray-50 cursor-pointer";
                let borderClass = daysPeminjamans.length > 0 ? "border-blue-300" : "border-gray-200";

                let html = `
                <div onclick="viewDaySchedule('${dateStr}')" class="${boxClass} flex flex-col rounded border ${borderClass} ${bgClass} transition p-1.5 md:p-2 overflow-hidden relative group shadow-sm hover:shadow-md">
                    <span class="font-bold text-gray-700 text-sm md:text-base mb-1.5">${i}</span>
                    <div class="day-badges-container flex-1 overflow-y-auto space-y-1.5">`;
                
                daysPeminjamans.forEach(b => {
                    let shortName = b.name.includes('(') ? b.name.split(' (')[0] : b.name;
                    html += `<div class="text-[10px] md:text-xs font-medium leading-tight p-1 md:p-1.5 rounded shadow-sm ${getRoomClass(b.room)}" title="${b.room} - ${b.name}">
                                ${b.start} ${shortName}
                             </div>`;
                });

                html += `</div>
                        ${daysPeminjamans.length > 0 ? `<div class="md:hidden absolute bottom-0.5 right-1.5 bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold shadow">${daysPeminjamans.length}</div>` : ''}
                    </div>`;
                calendar.innerHTML += html;
            }
        }

        function viewDaySchedule(dateStr) {
            // Isi tanggal secara otomatis ke dalam form di modal
            document.getElementById('bDate').value = dateStr;

            const modalTitle = document.getElementById('viewDayTitle');
            const content = document.getElementById('viewDayContent');
            
            const parts = dateStr.split('-');
            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            modalTitle.innerHTML = `<i class="far fa-calendar-check"></i> Jadwal: ${dateObj.toLocaleDateString('id-ID', options)}`;
            
            let daysPeminjamans = Peminjamans.filter(b => b.date === dateStr);
            daysPeminjamans.sort((a,b) => a.start.localeCompare(b.start));
            
            if (daysPeminjamans.length === 0) {
                content.innerHTML = `
                    <div class="text-center text-gray-400 py-16 flex flex-col items-center bg-white rounded-lg border border-dashed border-gray-300">
                        <i class="far fa-folder-open text-5xl mb-4 text-gray-300"></i>
                        <p class="font-medium text-gray-500">Belum ada peminjaman ruangan</p>
                        <p class="text-xs mt-1 text-gray-400">Silakan isi formulir di samping untuk memesan.</p>
                    </div>`;
            } else {
                let html = '';
                daysPeminjamans.forEach(b => {
                    html += `
                    <div class="p-4 rounded-lg border bg-white shadow-sm text-sm border-l-4 border-blue-500 hover:shadow-md transition">
                        <div class="font-bold text-base mb-2 flex justify-between items-start border-b border-gray-100 pb-2">
                            <span class="text-gray-800">${b.name}</span>
                        </div>
                        <div class="space-y-2.5 opacity-90 text-gray-700 mt-3">
                            <div class="flex items-center gap-3"><i class="fas fa-door-open text-blue-500 w-5 text-center text-lg"></i> <span class="font-semibold flex items-center gap-2">${b.room} <span class="px-2 py-0.5 rounded text-[10px] ${getRoomClass(b.room)}">Dipesan</span></span></div>
                            <div class="flex items-center gap-3"><i class="far fa-clock text-orange-500 w-5 text-center text-lg"></i> <span class="font-medium">${b.start} - ${b.end} WIB</span></div>
                            <div class="flex items-center gap-3"><i class="fas fa-phone-alt text-green-500 w-5 text-center text-lg"></i> ${generateWaLinkHTML(b.phone)}</div>
                        </div>
                    </div>`;
                });
                content.innerHTML = html;
            }
            
            document.getElementById('viewDayModal').style.display = 'flex';
        }

        async function savePeminjaman(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalBtnHtml = btn.innerHTML;

            const namaInput = document.getElementById('bName').value;
            const divisiInput = document.getElementById('bDivisi').value;
            const phone = document.getElementById('bPhone').value;
            const room = document.getElementById('bRoom').value;
            const date = document.getElementById('bDate').value;
            const start = document.getElementById('bStart').value;
            const end = document.getElementById('bEnd').value;

            if (start >= end) { 
                alert("Jam selesai harus lebih akhir dari jam mulai!"); 
                return; 
            }

            const name = `${namaInput} (${divisiInput})`;

            let clash = Peminjamans.find(b => 
                b.date === date && b.room === room && 
                ((start >= b.start && start < b.end) || (end > b.start && end <= b.end) || (start <= b.start && end >= b.end))
            );

            if(clash) {
                alert(`Gagal! ${room} sudah dipinjam pada jam tersebut oleh ${clash.name}`);
                return;
            }

            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memproses...";
            btn.disabled = true;

            const newPeminjaman = { id: Date.now().toString(), name, room, date, start, end, phone };
            
            Peminjamans.push(newPeminjaman);
            renderCalendar();

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "save", booking: newPeminjaman })
                });

                const result = await response.json();
                
                if (result.status === 'error') {
                    alert("Gagal menyimpan dari server Google: " + result.message);
                } else {
                    alert("Peminjaman Berhasil Dicatat!");
                    // Reset Form tapi kembalikan tanggal ke semula
                    document.getElementById('PeminjamanForm').reset();
                    document.getElementById('bDate').value = date;
                    filterNamesByDivision(); 
                    
                    // Segarkan list di dalam modal tanpa menutup modalnya
                    viewDaySchedule(date);

                    const waText = `Halo Admin GA,%0A%0ASaya melakukan Peminjaman ruangan:%0A*Nama:* ${namaInput}%0A*Divisi:* ${divisiInput}%0A*No WA:* ${phone}%0A*Ruangan:* ${room}%0A*Waktu:* ${date}, ${start} - ${end} WIB`;
                    setTimeout(() => {
                        window.open(`https://wa.me/${ADMIN_WA}?text=${waText}`, '_blank');
                    }, 500);
                }
            } catch (error) { 
                console.error("Error Sistem:", error); 
                alert("Terjadi kegagalan jaringan saat menyimpan. Silakan coba lagi.");
            }

            btn.innerHTML = originalBtnHtml;
            btn.disabled = false;
        }

        function showAdminLogin() { document.getElementById('adminModal').style.display = 'flex'; }
        
        function processAdminLogin() {
            if(document.getElementById('admUser').value === 'Admin' && document.getElementById('admPass').value === 'AdminGA') {
                closeModal('adminModal');
                document.getElementById('admUser').value = '';
                document.getElementById('admPass').value = '';
                document.getElementById('adminDashboard').style.display = 'flex';
                renderAdminTable();
            } else { 
                alert("Username atau Password Salah!"); 
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            
            if(Peminjamans.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center p-6 text-gray-500">Tidak ada data Peminjaman di dalam sistem</td></tr>`;
                return;
            }

            [...Peminjamans].sort((a,b) => b.date.localeCompare(a.date)).forEach(b => {
                let waCell = b.phone ? `<a href="https://wa.me/${formatPhoneForWA(b.phone)}" target="_blank" class="text-green-600 hover:text-green-800 hover:underline font-medium"><i class="fab fa-whatsapp"></i> ${b.phone}</a>` : '-';
                tbody.innerHTML += `
                <tr class="hover:bg-blue-50 transition border-b border-gray-100">
                    <td class="p-3 text-gray-800 font-medium">${b.date}</td>
                    <td class="p-3 text-gray-800">${b.start} - ${b.end}</td>
                    <td class="p-3"><span class="${getRoomClass(b.room)} px-2.5 py-1 rounded text-xs whitespace-nowrap font-medium">${b.room}</span></td>
                    <td class="p-3 text-gray-800">${b.name}</td>
                    <td class="p-3 text-gray-800">${waCell}</td>
                    <td class="p-3 text-center">
                        <button onclick="deletePeminjaman(this, '${b.id}')" class="bg-red-50 text-red-500 hover:bg-red-600 hover:text-white p-2 rounded transition shadow-sm border border-red-100 hover:border-red-600" title="Hapus Jadwal">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>`;
            });
        }

        async function deletePeminjaman(btnElement, id) {
            if(confirm("Apakah Anda yakin ingin menghapus jadwal ini secara permanen?")) {
                const originalHtml = btnElement.innerHTML;
                btnElement.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
                btnElement.disabled = true;

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        redirect: 'follow', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: "delete", id: id })
                    });
                    
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        Peminjamans = Peminjamans.filter(b => b.id != id);
                        renderAdminTable();
                        renderCalendar();
                        
                        // Tutup modal ViewDay jika sedang terbuka karena datanya berubah
                        if(document.getElementById('viewDayModal').style.display === 'flex'){
                           document.getElementById('viewDayModal').style.display = 'none';
                        }
                    } else {
                        alert("Gagal menghapus: " + result.message);
                        btnElement.innerHTML = originalHtml;
                        btnElement.disabled = false;
                    }
                } catch (e) { 
                    alert("Terjadi kegagalan jaringan saat menghapus.");
                    console.error("Gagal hapus di database:", e); 
                    btnElement.innerHTML = originalHtml;
                    btnElement.disabled = false;
                }
            }
        }

        function downloadSpreadsheet() {
            let csv = "Tanggal,Mulai,Selesai,Ruangan,Pemesan,No WhatsApp\n";
            Peminjamans.forEach(b => { 
                let phoneSafe = b.phone ? b.phone.toString() : "";
                csv += `${b.date},${b.start},${b.end},${b.room},${b.name.replace(/,/g, '')},${phoneSafe}\n`; 
            });
            const link = document.createElement("a");
            link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
            link.download = "Data_Jadwal_Ruangan.csv";
            link.click();
        }

        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; }
        
        window.onclick = function(event) {
            if (event.target.classList.contains('fixed') && event.target.style.display !== 'none') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
