<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Booking Ruang Meeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Warna Khusus Ruangan */
        .bg-cycling { background-color: #3b82f6; color: white; border: 1px solid #2563eb; }
        .bg-football { background-color: #8b5cf6; color: white; border: 1px solid #7c3aed; }
        .bg-running { background-color: #f59e0b; color: white; border: 1px solid #d97706; }
        .bg-athletic { background-color: #10b981; color: white; border: 1px solid #059669; }
        .bg-basketball { background-color: #ec4899; color: white; border: 1px solid #db2777; }

        /* Sembunyikan scrollbar pada badge hari agar rapi */
        .day-badges-container::-webkit-scrollbar { display: none; }
        .day-badges-container { scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img class="h-10 md:h-12 w-auto object-contain bg-white p-1 rounded shadow-sm" src="./logo.png" alt="Logo" onerror="this.style.display='none'">
                <h1 class="text-xl font-bold tracking-wide">Booking Ruangan</h1>
            </div>
            <button onclick="showAdminLogin()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition shadow flex items-center gap-2">
                <i class="fas fa-user-shield"></i> <span class="hidden md:inline">Admin Login</span>
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div class="bg-white p-6 rounded-xl shadow-md">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                    <h2 class="text-2xl font-bold text-gray-700">Jadwal Ruangan</h2>
                    <div class="flex gap-2">
                        <select id="yearSelect" class="border rounded p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" onchange="renderCalendar()"></select>
                        <select id="monthSelect" class="border rounded p-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" onchange="renderCalendar()">
                            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                            <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                            <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                            <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-1 text-center mb-2 font-semibold text-gray-500 text-sm">
                    <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-1 text-sm bg-gray-50 border border-gray-200 rounded-lg p-1">
                    </div>
                
                <div class="mt-4 flex flex-wrap gap-3 text-xs justify-center font-medium">
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-cycling rounded-full"></div> Cycling</span>
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-football rounded-full"></div> FootBall</span>
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-running rounded-full"></div> Running</span>
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-athletic rounded-full"></div> Athletic</span>
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-basketball rounded-full"></div> Basketball</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-600" id="formSection">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-800">
                    <i class="far fa-calendar-plus text-blue-600"></i> Form Booking Baru
                </h3>
                
                <form id="bookingForm" onsubmit="saveBooking(event)" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Divisi</label>
                            <select id="bDivisi" required onchange="filterNamesByDivision()" class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="" disabled selected>-- Memuat Data... --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pemesan</label>
                            <select id="bName" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="" disabled selected>-- Pilih Divisi Terlebih Dahulu --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Ruangan</label>
                            <select id="bRoom" required class="w-full border rounded-lg p-2.5 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="Cycling Room">Cycling Room (Kaps. 8)</option>
                                <option value="FootBall Room">FootBall Room (Kaps. 9)</option>
                                <option value="Running Room">Running Room (Kaps. 3)</option>
                                <option value="Athletic Room">Athletic Room (Kaps. 6)</option>
                                <option value="Basketball Room">Basketball Room (Kaps. 12)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                            <input type="date" id="bDate" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jam Mulai</label>
                            <input type="time" id="bStart" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jam Selesai</label>
                            <input type="time" id="bEnd" required class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full mt-4 bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow transition transform active:scale-95 flex justify-center items-center gap-2">
                        <i class="fas fa-check-circle"></i> Konfirmasi Booking
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow-md sticky top-24 h-[85vh] flex flex-col">
                <h3 class="text-lg font-bold border-b pb-2 mb-2 flex justify-between items-center text-gray-800">
                    <span><i class="fas fa-list-ul text-blue-500 mr-2"></i>Jadwal Bulan Ini</span>
                    <span class="text-xs bg-gray-200 px-2 py-1 rounded-full text-gray-600" id="totalBookings">0</span>
                </h3>
                <div id="bookingList" class="flex-1 overflow-y-auto space-y-3 pr-2 mt-2">
                    <div class="text-center text-gray-400 mt-10"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Memuat jadwal...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="viewDayModal" style="display: none; z-index: 9999;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col max-h-[85vh] overflow-hidden">
            <div class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
                <h3 class="font-bold text-lg" id="viewDayTitle">Detail Jadwal</h3>
                <button onclick="closeModal('viewDayModal')" class="text-white hover:text-red-300 font-bold text-2xl leading-none">&times;</button>
            </div>
            <div id="viewDayContent" class="p-5 overflow-y-auto flex-1 space-y-3 bg-gray-50"></div>
            <div class="p-4 border-t bg-white flex justify-end gap-2">
                <button onclick="closeModal('viewDayModal')" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-4 py-2 rounded-lg shadow-sm">Tutup</button>
            </div>
        </div>
    </div>

    <div id="adminModal" style="display: none; z-index: 9999;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="bg-blue-800 text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-lock"></i> Admin Login</h3>
                <button onclick="closeModal('adminModal')" class="text-white hover:text-red-300 font-bold text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="admUser" class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="admPass" class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                </div>
                <button onclick="processAdminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow mt-2">Login</button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" style="display: none; z-index: 9999;" class="fixed inset-0 bg-black bg-opacity-60 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh]">
            <div class="bg-red-700 text-white p-4 flex justify-between items-center shadow-md rounded-t-xl">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-cogs"></i> Dashboard Admin GA</h3>
                <button onclick="closeModal('adminDashboard')" class="text-white hover:text-red-300 font-bold text-2xl leading-none">&times;</button>
            </div>
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <span class="text-sm text-gray-600 font-medium">Manajemen Jadwal Ruangan</span>
                <button onclick="downloadSpreadsheet()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow flex items-center gap-2">
                    <i class="fas fa-file-csv"></i> Download CSV
                </button>
            </div>
            <div class="p-0 overflow-y-auto flex-1 bg-white">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-gray-100 text-gray-700 sticky top-0 shadow-sm">
                        <tr>
                            <th class="p-3 border-b">Tanggal</th>
                            <th class="p-3 border-b">Jam</th>
                            <th class="p-3 border-b">Ruangan</th>
                            <th class="p-3 border-b">Pemesan</th>
                            <th class="p-3 border-b text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // PASTIKAN SCRIPT_URL INI ADALAH URL DEPLOYMENT VERSI BARU ANDA
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGjJn8ohlDqwNGwuVyqrBzwXjD2OBgRH_T1fFp54kvI0V8CgD3qIY7AImQjbNv0gxX/exec'; 
        const ADMIN_WA = '62881081371012'; 

        let bookings = [];
        let employeesData = []; 

        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const today = new Date();
        let currentMonth = today.getMonth();
        let currentYear = today.getFullYear();

        document.addEventListener('DOMContentLoaded', () => {
            initControls();
            document.getElementById('calendar').innerHTML = "<div class='col-span-7 text-center py-10 text-blue-600 font-bold'><i class='fas fa-spinner fa-spin text-2xl mb-2'></i><br>Menghubungkan ke Database...</div>";
            loadBookings();
        });

        function initControls() {
            const mSelect = document.getElementById('monthSelect');
            const ySelect = document.getElementById('yearSelect');

            mSelect.value = currentMonth;

            ySelect.innerHTML = "";
            for(let y = currentYear - 1; y <= currentYear + 2; y++) {
                let opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                if(y === currentYear) opt.selected = true;
                ySelect.appendChild(opt);
            }
        }

        async function loadBookings() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                let rawBookings = [];

                if (Array.isArray(data)) {
                    rawBookings = data;
                    renderOptions('bDivisi', ['-- Harap perbarui Google Script --']);
                } else {
                    rawBookings = data.bookings || [];
                    
                    employeesData = [];
                    const rawNames = data.names || [];
                    const rawDivisions = data.divisions || [];
                    
                    for(let i = 0; i < Math.max(rawNames.length, rawDivisions.length); i++) {
                        if(rawNames[i] && rawDivisions[i]) {
                            employeesData.push({ name: rawNames[i], division: rawDivisions[i] });
                        }
                    }
                    
                    const uniqueDivisions = [...new Set(employeesData.map(e => e.division))];
                    renderOptions('bDivisi', uniqueDivisions);
                }

                bookings = rawBookings.map(b => {
                    let formattedDate = b.date;
                    let formattedStart = b.start;
                    let formattedEnd = b.end;

                    if (typeof formattedDate === 'string' && formattedDate.includes('T')) {
                        let d = new Date(formattedDate);
                        formattedDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    }

                    if (typeof formattedStart === 'string' && formattedStart.includes('T')) {
                        let d = new Date(formattedStart);
                        formattedStart = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
                    } else if (typeof formattedStart === 'string' && formattedStart.length <= 5 && !formattedStart.includes('T')) {
                        if(formattedStart.length === 4) formattedStart = '0' + formattedStart;
                    }

                    if (typeof formattedEnd === 'string' && formattedEnd.includes('T')) {
                        let d = new Date(formattedEnd);
                        formattedEnd = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
                    } else if (typeof formattedEnd === 'string' && formattedEnd.length <= 5 && !formattedEnd.includes('T')) {
                        if(formattedEnd.length === 4) formattedEnd = '0' + formattedEnd;
                    }

                    return { ...b, date: formattedDate, start: formattedStart, end: formattedEnd };
                });
                
                renderCalendar();
            } catch (error) {
                document.getElementById('calendar').innerHTML = `<div class='col-span-7 text-center py-4 text-red-600 font-bold bg-red-50 border border-red-200 rounded p-2'>❌ Gagal terhubung ke database.</div>`;
                console.error(error);
            }
        }

        function renderOptions(elementId, items) {
            const select = document.getElementById(elementId);
            select.innerHTML = `<option value="" disabled selected>-- Pilih --</option>`;
            items.forEach(item => {
                if(item) select.innerHTML += `<option value="${item}">${item}</option>`;
            });
        }

        function filterNamesByDivision() {
            const selectedDivision = document.getElementById('bDivisi').value;
            const nameDropdown = document.getElementById('bName');
            
            nameDropdown.innerHTML = `<option value="" disabled selected>-- Pilih Nama --</option>`;
            
            if(selectedDivision) {
                const filteredNames = employeesData
                                      .filter(e => e.division === selectedDivision)
                                      .map(e => e.name);
                
                filteredNames.forEach(name => {
                    nameDropdown.innerHTML += `<option value="${name}">${name}</option>`;
                });
            } else {
                nameDropdown.innerHTML = `<option value="" disabled selected>-- Pilih Divisi Dulu --</option>`;
            }
        }

        function getRoomClass(roomName) {
            if (roomName.includes('Cycling')) return 'bg-cycling';
            if (roomName.includes('FootBall')) return 'bg-football';
            if (roomName.includes('Running')) return 'bg-running';
            if (roomName.includes('Athletic')) return 'bg-athletic';
            if (roomName.includes('Basketball')) return 'bg-basketball';
            return 'bg-gray-500 text-white'; 
        }

        function renderCalendar() {
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            currentYear = parseInt(document.getElementById('yearSelect').value);

            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Padding hari kosong di awal bulan
            for(let i = 0; i < firstDay; i++) {
                calendar.innerHTML += `<div class="h-20 md:h-24 bg-transparent"></div>`;
            }

            for(let i = 1; i <= daysInMonth; i++) {
                let dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                let daysBookings = bookings.filter(b => b.date === dateStr);
                daysBookings.sort((a,b) => a.start.localeCompare(b.start));

                let bgClass = daysBookings.length > 0 ? "bg-blue-50 hover:bg-blue-100 cursor-pointer" : "bg-white hover:bg-gray-50 cursor-pointer";
                let borderClass = daysBookings.length > 0 ? "border-blue-200" : "border-gray-200";

                let html = `
                <div onclick="viewDaySchedule('${dateStr}')" class="h-20 md:h-24 flex flex-col rounded border ${borderClass} ${bgClass} transition p-1 overflow-hidden relative group">
                    <span class="font-bold text-gray-700 text-xs md:text-sm mb-1">${i}</span>
                    <div class="day-badges-container flex-1 overflow-y-auto space-y-1">`;
                
                daysBookings.forEach(b => {
                    let shortName = b.name.includes('(') ? b.name.split(' (')[0] : b.name;
                    html += `<div class="text-[9px] md:text-[10px] leading-tight p-0.5 md:p-1 rounded truncate shadow-sm ${getRoomClass(b.room)}" title="${b.room} - ${b.name}">
                                ${b.start} ${shortName}
                             </div>`;
                });

                html += `</div>
                        ${daysBookings.length > 0 ? `<div class="md:hidden absolute bottom-0 right-1 text-blue-600 text-xs font-bold">${daysBookings.length}</div>` : ''}
                    </div>`;
                calendar.innerHTML += html;
            }
            renderSidebar(); 
        }

        function viewDaySchedule(dateStr) {
            const modalTitle = document.getElementById('viewDayTitle');
            const content = document.getElementById('viewDayContent');
            
            const parts = dateStr.split('-');
            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            modalTitle.innerText = dateObj.toLocaleDateString('id-ID', options);
            
            let daysBookings = bookings.filter(b => b.date === dateStr);
            daysBookings.sort((a,b) => a.start.localeCompare(b.start));
            
            if (daysBookings.length === 0) {
                content.innerHTML = `
                    <div class="text-center text-gray-400 py-10 flex flex-col items-center">
                        <i class="far fa-calendar-check text-4xl mb-3 text-gray-300"></i>
                        <p>Belum ada ruangan yang dibooking pada tanggal ini.</p>
                    </div>`;
            } else {
                let html = '';
                daysBookings.forEach(b => {
                    const roomBadgeClass = getRoomClass(b.room);
                    html += `
                    <div class="p-4 rounded-lg border bg-white shadow-sm text-sm border-l-4" style="border-left-color: ${getComputedStyle(document.documentElement).getPropertyValue('--primary') || '#2563eb'}">
                        <div class="font-bold text-base mb-2 flex justify-between items-start border-b pb-2">
                            <span>${b.name}</span>
                        </div>
                        <div class="space-y-2 opacity-90 text-xs text-gray-800">
                            <div class="flex items-center gap-2"><i class="fas fa-door-open text-blue-500 w-4 text-center"></i> <span class="font-semibold flex items-center gap-2">${b.room} <span class="px-2 py-0.5 rounded text-[10px] ${roomBadgeClass}">Booked</span></span></div>
                            <div class="flex items-center gap-2"><i class="far fa-clock text-orange-500 w-4 text-center"></i> <span>Jam: ${b.start} - ${b.end} WIB</span></div>
                        </div>
                    </div>`;
                });
                content.innerHTML = html;
            }
            
            document.getElementById('viewDayModal').style.display = 'flex';
        }

        function renderSidebar() {
            const list = document.getElementById('bookingList');
            const totalSpan = document.getElementById('totalBookings');
            list.innerHTML = '';
            
            let monthlyBookings = bookings.filter(b => {
                if(!b.date) return false;
                const parts = b.date.split('-');
                return parseInt(parts[1]) - 1 === currentMonth && parseInt(parts[0]) === currentYear;
            });

            monthlyBookings.sort((a,b) => a.date.localeCompare(b.date));
            totalSpan.innerText = monthlyBookings.length;

            if(monthlyBookings.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 mt-10">Tidak ada jadwal bulan ini.</div>';
                return;
            }

            monthlyBookings.forEach(b => {
                const [year, month, day] = b.date.split('-');
                const roomBadgeClass = getRoomClass(b.room);
                
                list.innerHTML += `
                    <div class="p-3 rounded shadow-sm bg-white border border-gray-100 relative group text-sm border-l-4" style="border-left-color: #3b82f6;">
                        <div class="font-bold flex justify-between items-start text-gray-800 mb-1">
                            <span class="truncate pr-2">${b.name}</span>
                        </div>
                        <div class="text-xs opacity-100 text-gray-700 space-y-1.5">
                            <div class="flex items-center"><i class="fas fa-door-open w-5 text-center text-blue-500"></i> <span class="font-semibold ${roomBadgeClass} px-1.5 py-0.5 rounded ml-1 text-[10px]">${b.room}</span></div>
                        </div>
                        <div class="text-xs mt-2 pt-2 border-t border-gray-100 opacity-80 flex flex-col md:flex-row md:justify-between gap-1">
                            <span><i class="far fa-calendar mr-1"></i> ${parseInt(day)} ${months[parseInt(month) - 1]}</span>
                            <span><i class="far fa-clock mr-1"></i> ${b.start} - ${b.end} WIB</span>
                        </div>
                    </div>`;
            });
        }

        async function saveBooking(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalBtnHtml = btn.innerHTML;

            const namaInput = document.getElementById('bName').value;
            const divisiInput = document.getElementById('bDivisi').value;
            const room = document.getElementById('bRoom').value;
            const date = document.getElementById('bDate').value;
            const start = document.getElementById('bStart').value;
            const end = document.getElementById('bEnd').value;

            if (start >= end) { 
                alert("Jam selesai harus lebih akhir dari jam mulai!"); 
                return; 
            }

            const name = `${namaInput} (${divisiInput})`;

            let clash = bookings.find(b => 
                b.date === date && b.room === room && 
                ((start >= b.start && start < b.end) || (end > b.start && end <= b.end) || (start <= b.start && end >= b.end))
            );

            if(clash) {
                alert(`Gagal! ${room} sudah dibooking pada jam tersebut oleh ${clash.name}`);
                return;
            }

            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memproses...";
            btn.disabled = true;

            const newBooking = { id: Date.now().toString(), name, room, date, start, end };
            
            bookings.push(newBooking);
            
            // Sync current view if needed
            const selectedDate = new Date(date);
            if (selectedDate.getMonth() !== currentMonth || selectedDate.getFullYear() !== currentYear) {
                document.getElementById('monthSelect').value = selectedDate.getMonth();
                document.getElementById('yearSelect').value = selectedDate.getFullYear();
            }
            renderCalendar();

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "save", booking: newBooking })
                });
            } catch (error) { 
                console.error("Gagal simpan ke database:", error); 
            }

            const waText = `Halo Admin GA,%0A%0ASaya booking ruangan:%0A*Nama:* ${namaInput}%0A*Divisi:* ${divisiInput}%0A*Ruangan:* ${room}%0A*Waktu:* ${date}, ${start} - ${end} WIB`;
            
            setTimeout(() => {
                window.open(`https://wa.me/${ADMIN_WA}?text=${waText}`, '_blank');
            }, 500);

            alert("Booking Berhasil Dicatat!");
            document.getElementById('bookingForm').reset();
            filterNamesByDivision(); 
            
            btn.innerHTML = originalBtnHtml;
            btn.disabled = false;
        }

        // --- Admin Functions ---
        function showAdminLogin() { 
            document.getElementById('adminModal').style.display = 'flex'; 
        }
        
        function processAdminLogin() {
            if(document.getElementById('admUser').value === 'Admin' && document.getElementById('admPass').value === 'AdminGA') {
                closeModal('adminModal');
                document.getElementById('admUser').value = '';
                document.getElementById('admPass').value = '';
                document.getElementById('adminDashboard').style.display = 'flex';
                renderAdminTable();
            } else { 
                alert("Username atau Password Salah!"); 
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            
            if(bookings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-gray-500">Tidak ada data booking</td></tr>`;
                return;
            }

            [...bookings].sort((a,b) => b.date.localeCompare(a.date)).forEach(b => {
                const roomBadgeClass = getRoomClass(b.room);
                tbody.innerHTML += `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-3 border-b text-gray-800">${b.date}</td>
                    <td class="p-3 border-b text-gray-800">${b.start} - ${b.end}</td>
                    <td class="p-3 border-b"><span class="${roomBadgeClass} px-2 py-1 rounded text-xs whitespace-nowrap">${b.room}</span></td>
                    <td class="p-3 border-b text-gray-800">${b.name}</td>
                    <td class="p-3 border-b text-center">
                        <button onclick="deleteBooking('${b.id}')" class="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white p-2 rounded transition shadow-sm" title="Hapus">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>`;
            });
        }

        async function deleteBooking(id) {
            if(confirm("Apakah Anda yakin ingin menghapus jadwal ini?")) {
                bookings = bookings.filter(b => b.id != id);
                renderAdminTable();
                renderCalendar();
                
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        redirect: 'follow', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: "delete", id: id })
                    });
                } catch (e) { 
                    console.error("Gagal hapus di database:", e); 
                }
            }
        }

        function downloadSpreadsheet() {
            let csv = "Tanggal,Mulai,Selesai,Ruangan,Pemesan\n";
            bookings.forEach(b => { csv += `${b.date},${b.start},${b.end},${b.room},${b.name.replace(/,/g, '')}\n`; });
            const link = document.createElement("a");
            link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
            link.download = "jadwal_ruangan.csv";
            link.click();
        }

        // --- Utility ---
        window.closeModal = function(id) { 
            document.getElementById(id).style.display = 'none'; 
        }
        
        window.onclick = function(event) {
            if (event.target.classList.contains('fixed') && event.target.style.display !== 'none') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
